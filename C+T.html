<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee & Contemplation - Reading View</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mywebtoonStyle.css">
  <style>
    /* Global Page Setup */
    body {
      background-color: #f4edd2; /* Matching retro paper tint */
      font-family: 'Patrick Hand', cursive;

      padding-top: 90px;    /* Space for top header */

<body>
