<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYWEBTOON</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mywebtoonStyle.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg retro-navbar">
        <div class="container-fluid">

            <a class="navbar-brand retro-brand" href="#">MYWEBTOON</a>

            <button class="navbar-toggler retro-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link retro-nav-link active" href="#" id="filter-all">Home</a>
                    </li>
                    
                    <li class="nav-item dropdown">
                        <a class="nav-link retro-nav-link dropdown-toggle" href="#" id="genreDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Genre
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="genreDropdown">
                            <li><a class="dropdown-item filter-genre" href="#" data-target-genre="Sci-Fi">Sci-Fi</a></li>
                            <li><a class="dropdown-item filter-genre" href="#" data-target-genre="Comedy">Comedy</a></li>
                            <li><a class="dropdown-item filter-genre" href="#" data-target-genre="Slice of Life">Slice of Life</a></li>
                        </ul>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link retro-nav-link" href="#" id="filter-coming-soon">Coming soon</a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>

    <main class="container my-5">

        <div class="row mb-5">
            <div class="col-12 text-center">
                <h1 style="font-family: 'Permanent Marker', cursive; font-size: 3rem; text-transform: uppercase;">
                    MY ONE-SHOT
                </h1>
                <p class="lead">my own one-shot webtoon!</p>
            </div>
        </div>

        <ul class="retro-horizontal-list row g-4" id="mytoon-list">

            <li class="col-sm-12 col-md-6 col-lg-4" data-date="2026-06-25" data-name="Stikman on spaceship" data-genre="Sci-Fi">
                <div class="retro-card">
                    <a href="SoS.html" class="retro-thumb-link">
                        <img src="SoS/stikmanOnASpaceship-thumbnail.png" alt="Stikman on spaceship" class="retro-thumb-img">
                    </a>
                    <div class="retro-card-body">
                        <h2 class="retro-list-title">
                            <a href="SoS.html">Stikman on spaceship</a>
                        </h2>
                        <span class="retro-genre-tag">Sci-Fi</span>
                        <span class="retro-list-date mt-2">June 24, 2026</span>
                    </div>
                </div>
            </li>

            <li class="col-sm-12 col-md-6 col-lg-4" data-date="coming soon" data-name="Mecha-Cat Doodle" data-genre="Comedy">
                <div class="retro-card">
                    <a href="Oneshot2.html" class="retro-thumb-link">
                        <img src="SoS/ComingSoon.png" alt="Mecha-Cat Doodle" class="retro-thumb-img">
                    </a>
                    <div class="retro-card-body">
                        <h2 class="retro-list-title">
                            <a href="Oneshot2.html">Mecha-Cat Doodle</a>
                        </h2>
                        <span class="retro-genre-tag">Comedy</span>
                        <span class="retro-list-date mt-2">coming soon</span>
                    </div>
                </div>
            </li>

            <li class="col-sm-12 col-md-6 col-lg-4" data-date="2026-06-28" data-name="Coffee & Contemplation" data-genre="Slice of Life">
                <div class="retro-card">
                    <a href="C+T.html" class="retro-thumb-link">
                        <img src="C+T/C+Thumbnail.png" alt="Coffee & Contemplation" class="retro-thumb-img">
                    </a>
                    <div class="retro-card-body">
                        <h2 class="retro-list-title">
                            <a href="C+T.html">Coffee & Contemplation</a>
                        </h2>
                        <span class="retro-genre-tag">Slice of Life</span>
                        <span class="retro-list-date mt-2">June 28, 2026</span>
                    </div>
                </div>
            </li>

        </ul>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. Grab all the list items (the webtoon cards)
            const items = document.querySelectorAll("#mytoon-list li");

            // 2. Setup the "Home" filter (Show Everything)
            document.getElementById("filter-all").addEventListener("click", (e) => {
                e.preventDefault(); 
                items.forEach(item => {
                    item.style.display = "block"; 
                });
            });

            // 3. Setup the "Genre" filters
            document.querySelectorAll(".filter-genre").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.preventDefault(); 
                    const targetGenre = e.target.getAttribute("data-target-genre"); 
                    
                    items.forEach(item => {
                        if (item.getAttribute("data-genre") === targetGenre) {
                            item.style.display = "block"; 
                        } else {
                            item.style.display = "none"; 
                        }
                    });
                });
            });

            // 4. Setup the "Coming Soon" filter
            document.getElementById("filter-coming-soon").addEventListener("click", (e) => {
                e.preventDefault(); 
                items.forEach(item => {
                    if (item.getAttribute("data-date") === "coming soon") {
                        item.style.display = "block"; 
                    } else {
                        item.style.display = "none"; 
                    }
                });
            });

        });
    </script>
</body>

</html>
